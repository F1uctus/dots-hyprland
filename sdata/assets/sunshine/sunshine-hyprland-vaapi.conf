# Sunshine — Hyprland + Intel i915 VAAPI (hybrid / eDP on Intel)
# Installed to ~/.var/app/dev.lizardbyte.app.Sunshine/config/sunshine/sunshine.conf
# when that file is missing or empty (see setup_sunshine_flatpak_for_user).
#
# Many Intel iGPUs expose HEVC decode (VLD) but not a stable HEVC encode path; Sunshine
# may still advertise hevc_vaapi. Moonlight can pick HEVC → black video. Force H.264.
#
# wan: pairing / web UI over Tailscale; Moonlight on Android usually needs Add PC by Tailnet IP
# (mDNS does not cross most VPNs). adapter_name: Intel is often renderD128; use vainfo if unsure.
#
# If Hyprland still crashes ~10–30s after connect (xdg-desktop-portal in dmesg): use the kms profile
# (sdata/assets/sunshine/sunshine-hyprland-vaapi-kms.conf) or SUNSHINE_USE_KMS_CAPTURE=true ./setup install-setups -f
# after: sudo setcap 'cap_sys_admin,cap_sys_nice+ep' /usr/local/bin/sunshine
#
# Gray picture + Moonlight "reduce bitrate" + huge "dropped frames (network)": Tailscale/Wi‑Fi path is
# oversaturated. Lower max_bitrate (5–12), set Moonlight client bitrate to ~5–10 Mbps, and check MTU
# (e.g. tailscale0 1280) if pings are huge.
encoder = vaapi
adapter_name = /dev/dri/renderD128
capture = wlr
hevc_mode = 1
av1_mode = 1
native_pen_touch = disabled
origin_web_ui_allowed = wan
# Mbps cap (0 = unlimited). 12 is friendlier over Tailscale + phone than 50; raise only on LAN ethernet.
max_bitrate = 1
fec_percentage = 45
ping_timeout = 45000
