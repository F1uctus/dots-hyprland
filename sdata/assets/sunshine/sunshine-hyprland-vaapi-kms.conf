# Sunshine — Hyprland + Intel VAAPI with KMS capture (no wlr/xdg-desktop-portal screencast).
# Use when streaming kills the session ~10–30s after connect (portal segfault in dmesg).
#
# Requires a real filesystem install of sunshine with file caps, e.g.:
#   sudo setcap 'cap_sys_admin,cap_sys_nice+ep' /usr/local/bin/sunshine-…   (real binary, not symlink)
# File caps set AT_SECURE → session D-Bus is blocked; keep system_tray off or tray spams errors.
# KMS may grab the Intel connector; hybrid laptops: verify adapter_name matches your iGPU render node.
encoder = vaapi
adapter_name = /dev/dri/renderD128
capture = kms
hevc_mode = 1
av1_mode = 1
native_pen_touch = disabled
origin_web_ui_allowed = wan
max_bitrate = 1
fec_percentage = 45
ping_timeout = 45000
# setcap → AT_SECURE: session bus unavailable; tray breaks without this
system_tray = false
