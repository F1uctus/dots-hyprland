# Sunshine — Hyprland + NVIDIA NVENC (hybrid laptop, GTX dGPU present)
# Requires Flatpak: org.freedesktop.Platform.GL.nvidia-* matching the host driver, and
# setup_sunshine_flatpak_for_user must set FLATPAK_GL_DRIVER (see 2.setups.sh).
# Capture stays wlr (Intel eDP framebuffer); encoding runs on NVIDIA via NVENC/CUDA.
# native_pen_touch: Wayland pen/touch passthrough can trigger xdg-desktop-portal segfaults in
# libwayland-client (~10–20s after connect); keep disabled unless you need tablet input.
#
# wan: pair / web UI from Tailnet or phone browsers (default Sunshine is lan-only).
# NVENC needs working CUDA (see nvidia-uvm, libcuda). If cuInit fails, use reliable vaapi:
#   SUNSHINE_USE_RELIABLE_ENCODER=true ./setup install-setups -f
encoder = nvenc
capture = wlr
hevc_mode = 2
av1_mode = 1
native_pen_touch = disabled
origin_web_ui_allowed = wan
max_bitrate = 1
fec_percentage = 45
ping_timeout = 45000
