# Bar, wallpaper
exec-once = ~/.config/hypr/hyprland/scripts/start_geoclue_agent.sh
exec-once = ~/.config/hypr/custom/scripts/__restore_video_wallpaper.sh

# Core components (authentication, lock screen, notification daemon)
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = hypridle
exec-once = sh -lc 'if command -v systemctl >/dev/null 2>&1; then dbus-update-activation-environment --systemd --all; else dbus-update-activation-environment --all; fi'
exec-once = pidof pipewire >/dev/null || pipewire
exec-once = pidof wireplumber >/dev/null || wireplumber
exec-once = pidof pipewire-pulse >/dev/null || pipewire-pulse
exec-once = killall polkit-kde-authentication-agent-1 polkit-gnome-authentication-agent-1 2>/dev/null || true

# Tailscale (Headscale) + Sunshine before QuickShell: start streaming stack before Qt shell
# (reduces portal/D-Bus contention at login; see remote-control-sunshine-tailscale.md).
exec-once = ~/.config/hypr/custom/scripts/tailscale_sunshine_autostart.sh &

exec-once = ~/.config/hypr/hyprland/scripts/start_quickshell.sh "$qsConfig"

# Audio
# Disabled because EasyEffects was becoming the default sink without forwarding
# to a physical output, causing silent playback.
# exec-once = easyeffects --hide-window --service-mode

# Clipboard: history
# exec-once = wl-paste --watch cliphist store &
exec-once = wl-paste --type text --watch bash -c 'cliphist store && qs -c $qsConfig ipc call cliphistService update'
exec-once = wl-paste --type image --watch bash -c 'cliphist store && qs -c $qsConfig ipc call cliphistService update'

# Cursor
exec-once = hyprctl setcursor Bibata-Modern-Classic 24

# Fix dock pinned apps not launching properly (https://github.com/end-4/dots-hyprland/issues/2200)
# This causes https://github.com/end-4/dots-hyprland/issues/2427
# exec-once = sleep 3.5 && hyprctl reload && sleep 0.5 && touch ~/.config/quickshell/ii/shell.qml
