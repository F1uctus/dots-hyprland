# Hyprland + multiple installed portals (kde/gnome/hyprland/wlr): the host
# /usr/libexec/xdg-desktop-portal can segfault in libwayland-client when a stream
# ends if heavy backends that also implement ScreenCast stay connected.
#
# - ScreenCast/Screenshot = wlr only: xdph ScreenCast + stream teardown has been observed to
#   segfault the host xdg-desktop-portal in libwayland-client (dmesg), killing the session.
#   xdph remains for RemoteDesktop (input) where wlr does not implement it.
# - If you need xdph pickers for screen share, try ScreenCast=hyprland or wlr;hyprland again at
#   your own risk.
# - Avoid FileChooser=kde here: that dbus-activates xdg-desktop-portal-kde, which
#   also registers ScreenCast/RemoteDesktop and may contribute to teardown races.
[preferred]
default = hyprland;gtk
org.freedesktop.impl.portal.Settings = gtk
org.freedesktop.impl.portal.FileChooser = gtk
org.freedesktop.impl.portal.ScreenCast = wlr
org.freedesktop.impl.portal.Screenshot = wlr
org.freedesktop.impl.portal.RemoteDesktop = hyprland